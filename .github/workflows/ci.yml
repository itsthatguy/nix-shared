name: CI

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  # Job 1: Verify the flake evaluates cleanly.
  # This catches broken overlay expressions, missing files, and bad Nix syntax
  # across all outputs (overlays, devenvModules) before any user imports them.
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Check flake
        run: nix flake check --all-systems

  # Job 2: Integration tests - run devenv build on each test project
  devenv-integration:
    name: devenv (${{ matrix.test }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test: [chunkhound, grepika]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - uses: ./.github/actions/stub-ollama

      - name: Run integration test
        run: cd tests/${{ matrix.test }} && devenv build
