name: CI

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  # Discover test directories for matrix
  discover-tests:
    name: discover tests
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.find.outputs.tests }}
    steps:
      - uses: actions/checkout@v5
      - id: find
        run: echo "tests=$(ls -d tests/*/ | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT

  # Verify the flake evaluates cleanly
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Check flake
        run: nix flake check --all-systems

  # Integration tests - run devenv build on each test project
  # Tests on Linux (covers Linux + WSL code paths) and macOS
  devenv-integration:
    name: devenv (${{ matrix.test }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: discover-tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        test: ${{ fromJson(needs.discover-tests.outputs.tests) }}
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - uses: ./.github/actions/stub-ollama

      - name: Run integration test
        run: cd tests/${{ matrix.test }} && devenv test
