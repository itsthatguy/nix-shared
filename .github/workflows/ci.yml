name: CI

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  # Verify the flake evaluates cleanly
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Check flake
        run: nix flake check --all-systems

  # Integration test - runs on both OSes to catch platform-specific issues.
  # The default test enables all modules (chrome-devtools, claude-git, chunkhound, grepika).
  # Individual module tests remain in tests/ for local debugging but don't run in CI.
  devenv-integration:
    name: devenv (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Run integration test
        run: cd tests/default && devenv test
